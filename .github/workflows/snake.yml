name: Generate Snake Animation

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: Platane/snk@v3
        with:
          github_user_name: Joshuaisikah
          outputs: |
            dist/snake-dark.svg?palette=github-dark&color_snake=%2300FF41&color_dots=%230D0D0D,%23003B00,%23006400,%2300A550,%2300FF41&color_snake_eye=%23FFE600

      - name: Slow down snake animation
        run: |
          sed -i 's/dur="[0-9.]*s"/dur="6s"/g' dist/snake-dark.svg
          sed -i 's/repeatCount="indefinite"/repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1"/g' dist/snake-dark.svg

      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
